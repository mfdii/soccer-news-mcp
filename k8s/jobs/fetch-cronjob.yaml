apiVersion: batch/v1
kind: CronJob
metadata:
  name: mcp-soccer-news-fetch
  namespace: mcp-soccer-news
  labels:
    app: mcp-soccer-news
    component: fetch
spec:
  # Run every 3 hours: at 0:00, 3:00, 6:00, 9:00, 12:00, 15:00, 18:00, 21:00
  schedule: "0 */3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid  # Don't allow overlapping jobs
  jobTemplate:
    metadata:
      labels:
        app: mcp-soccer-news
        component: fetch
    spec:
      ttlSecondsAfterFinished: 7200  # Clean up 2 hours after completion
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: mcp-soccer-news
            component: fetch
        spec:
          restartPolicy: OnFailure
          containers:
          - name: fetch
            image: image-registry.openshift-image-registry.svc:5000/mcp-soccer-news/mcp-soccer-news:latest
            command: ["npm", "run", "fetch-feeds"]
            env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRESQL_DATABASE
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRESQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRESQL_PASSWORD
            - name: MAX_ARTICLES_PER_SOURCE
              value: "50"  # Fetch up to 50 articles per source
            - name: SKIP_EMBEDDINGS
              value: "false"
            - name: MODEL_CACHE_PATH
              value: /opt/app-root/src/.transformers-cache
            resources:
              requests:
                memory: "2Gi"
                cpu: "500m"
              limits:
                memory: "4Gi"
                cpu: "2000m"
