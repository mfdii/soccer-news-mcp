apiVersion: batch/v1
kind: Job
metadata:
  name: soccer-news-backfill
  namespace: mcp-soccer-news
  labels:
    app: mcp-soccer-news
    component: backfill
spec:
  ttlSecondsAfterFinished: 3600  # Clean up 1 hour after completion
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: mcp-soccer-news
        component: backfill
    spec:
      restartPolicy: OnFailure
      containers:
      - name: backfill
        image: image-registry.openshift-image-registry.svc:5000/mcp-soccer-news/mcp-soccer-news:latest
        command: ["npm", "run", "fetch-feeds"]
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRESQL_DATABASE
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRESQL_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRESQL_PASSWORD
        - name: MAX_ARTICLES_PER_SOURCE
          value: "100"  # Fetch up to 100 articles per source for initial backfill
        - name: SKIP_EMBEDDINGS
          value: "false"
        - name: MODEL_CACHE_PATH
          value: /opt/app-root/src/.transformers-cache
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
