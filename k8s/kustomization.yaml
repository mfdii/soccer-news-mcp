apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mcp-soccer-news

resources:
  # Namespace
  - postgres/namespace.yaml
  
  # PostgreSQL
  - postgres/secret.yaml
  - postgres/pvc.yaml
  - postgres/configmap.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  
  # Application
  - app/secret-env.yaml
  - app/imagestream.yaml
  - app/buildconfig.yaml
  - app/deployment.yaml
  - app/service.yaml
  - app/route.yaml
  
  # Jobs
  - job-migrate.yaml
  - job-seed.yaml

# Generate random passwords for secrets
secretGenerator:
  - name: postgres-password
    literals:
      - password=$(openssl rand -base64 32)
