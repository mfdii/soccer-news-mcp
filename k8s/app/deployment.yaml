apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-soccer-news
  namespace: mcp-soccer-news
  labels:
    app: mcp-soccer-news
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-soccer-news
  template:
    metadata:
      labels:
        app: mcp-soccer-news
    spec:
      containers:
      - name: mcp-soccer-news
        image: image-registry.openshift-image-registry.svc:5000/mcp-soccer-news/mcp-soccer-news:latest
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        envFrom:
        - secretRef:
            name: mcp-soccer-news-env
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      imagePullPolicy: Always
