apiVersion: v1
kind: Secret
metadata:
  name: mcp-soccer-news-env
  namespace: mcp-soccer-news
type: Opaque
stringData:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: soccer_news
  DB_USER: soccernews
  DB_PASSWORD: changeme-generate-strong-password
  DB_SSL: "false"
  DB_POOL_MAX: "20"
  DB_IDLE_TIMEOUT: "30000"
  DB_CONNECTION_TIMEOUT: "10000"
  EMBEDDING_MODEL: Xenova/all-MiniLM-L6-v2
  SENTIMENT_MODEL: Xenova/distilbert-base-uncased-finetuned-sst-2-english
  EMBEDDING_DIMENSIONS: "384"
  MAX_BATCH_SIZE: "50"
  MODEL_CACHE_PATH: /opt/app-root/src/.transformers-cache
  PORT: "3000"
  SESSION_TIMEOUT: "1800000"
  LOG_LEVEL: info
