apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mcp-soccer-news
  namespace: mcp-soccer-news
  labels:
    app: mcp-soccer-news
spec:
  source:
    type: Git
    git:
      uri: https://github.com/mfdii/mcp-soccer-news.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: mcp-soccer-news:latest
  triggers:
  - type: ConfigChange
  - type: GitHub
    github:
      secret: soccer-news-webhook-secret
