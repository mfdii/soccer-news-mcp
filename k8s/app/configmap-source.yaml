apiVersion: v1
kind: ConfigMap
metadata:
  name: soccer-news-source
  namespace: mcp-soccer-news
data:
  package.json: |
    {
      "name": "soccer-news-mcp",
      "version": "1.0.0",
      "description": "MCP server for soccer news with RAG and sentiment analysis",
      "type": "module",
      "main": "dist/server.js",
      "scripts": {
        "build": "tsc",
        "start": "node dist/server.js"
      },
      "dependencies": {
        "@modelcontextprotocol/sdk": "^1.26.0",
        "@xenova/transformers": "^2.17.2",
        "pg": "^8.13.1",
        "pgvector": "^0.2.0",
        "rss-parser": "^3.13.0",
        "express": "^4.21.2",
        "zod": "^3.25.0"
      },
      "devDependencies": {
        "typescript": "^5.6.2",
        "@types/node": "^22.10.2",
        "@types/pg": "^8.11.10",
        "@types/express": "^4.17.21"
      }
    }

  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "ES2022",
        "module": "ES2022",
        "lib": ["ES2022"],
        "moduleResolution": "node",
        "outDir": "./dist",
        "rootDir": "./src",
        "strict": true,
        "esModuleInterop": true,
        "skipLibCheck": true,
        "forceConsistentCasingInFileNames": true,
        "resolveJsonModule": true,
        "declaration": true,
        "declarationMap": true,
        "sourceMap": true,
        "types": ["node"]
      },
      "include": ["src/**/*"],
      "exclude": ["node_modules", "dist"]
    }
